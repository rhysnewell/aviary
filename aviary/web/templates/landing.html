<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aviary — Metagenomics Pipeline</title>
  <link rel="icon" href="/logo" type="image/png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:     #2ec4b6;
      --forest:   #3a8c5a;
      --leaf:     #5cb87a;
      --leaf-lt:  #8fffb2;
      --node-sz:  76px;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #061a0d;
    }

    #cvs { position: fixed; inset: 0; z-index: 0; }

    #net {
      position: fixed; inset: 0; z-index: 1;
      pointer-events: none; overflow: visible;
    }

    /* ── Hub ─────────────────────────────────────────────── */
    #hub {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      animation: hub-in 0.8s ease both;
    }
    @keyframes hub-in { from { opacity: 0; } to { opacity: 1; } }

    .aura {
      position: absolute; border-radius: 50%;
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      pointer-events: none;
    }
    .aura-1 {
      width: 520px; height: 520px;
      background: radial-gradient(circle,
        rgba(58,140,90,0.13) 0%,
        rgba(46,196,182,0.05) 42%,
        transparent 70%);
      animation: aura-pulse 5s ease-in-out infinite;
    }
    @keyframes aura-pulse {
      0%,100% { transform: translate(-50%,-50%) scale(1.00); opacity: 0.65; }
      50%      { transform: translate(-50%,-50%) scale(1.12); opacity: 1.00; }
    }

    .logo-wrap {
      position: relative; z-index: 2;
      width: 330px; height: 330px;
      display: flex; align-items: center; justify-content: center;
    }


    .logo-wrap img {
      width: 320px; height: 320px;
      object-fit: contain; border-radius: 24px;
      filter:
        drop-shadow(0 0 14px rgba(58,140,90,0.65))
        drop-shadow(0 0 36px rgba(46,196,182,0.25));
      animation: logo-float 5s ease-in-out infinite;
      position: relative; z-index: 3;
    }
    @keyframes logo-float {
      0%,100% { transform: translateY(0px); }
      50%      { transform: translateY(-8px); }
    }

    /* ── Hub text ────────────────────────────────────────── */
    #hub-text {
      position: fixed;
      left: 50%; top: calc(50% + 155px);
      transform: translateX(-50%);
      z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; gap: 7px;
      pointer-events: none;
      animation: text-in 1.2s ease both;
    }
    @keyframes text-in {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .hub-title {
      font-size: 2.2rem; font-weight: 800;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: #ffffff;
      text-shadow:
        0 0 6px #fff,
        0 0 16px rgba(92,184,122,0.90),
        0 0 38px rgba(46,196,182,0.55),
        0 0 70px rgba(58,140,90,0.35);
    }
    .hub-sub {
      font-size: 0.70rem; letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--leaf); opacity: 0.75;
    }

    /* ── Nodes ───────────────────────────────────────────── */
    a.node {
      position: fixed; z-index: 8;
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
      text-decoration: none;
      transform: translate(-50%, -50%);
      cursor: pointer;
      transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
      opacity: 0;
      animation: node-in 0.6s ease forwards;
    }
    @keyframes node-in { from { opacity: 0; } to { opacity: 1; } }

    a.node:hover { transform: translate(-50%, -50%) scale(1.28); }

    .disc {
      width: var(--node-sz); height: var(--node-sz);
      border-radius: 50%;
      border: 1.5px solid rgba(92,184,122,0.35);
      background: radial-gradient(circle at 38% 38%,
        rgba(58,140,90,0.12) 0%, rgba(2,11,5,0.97) 65%);
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.28s, background 0.28s, box-shadow 0.28s;
      box-shadow:
        0 0 10px rgba(58,140,90,0.10),
        inset 0 0 12px rgba(58,140,90,0.06);
    }
    .disc svg {
      width: 28px; height: 28px; fill: none;
      stroke: var(--teal); stroke-width: 1.5;
      stroke-linecap: round; stroke-linejoin: round;
      opacity: 0.75; transition: stroke 0.28s, opacity 0.28s;
    }

    a.node:hover .disc {
      border-color: rgba(143,255,178,0.80);
      background: radial-gradient(circle at 38% 38%,
        rgba(92,184,122,0.22) 0%, rgba(2,11,8,0.97) 70%);
      box-shadow:
        0 0 22px rgba(143,255,178,0.45),
        0 0 44px rgba(58,140,90,0.22),
        inset 0 0 18px rgba(92,184,122,0.10);
    }
    a.node:hover .disc svg { stroke: #c8ffe0; opacity: 1; }

    .node-lbl {
      font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.11em; text-transform: uppercase;
      color: rgba(120,185,140,0.60);
      white-space: nowrap; text-align: center;
      transition: color 0.28s, text-shadow 0.28s;
    }
    a.node:hover .node-lbl {
      color: #c8ffe0;
      text-shadow: 0 0 8px rgba(92,184,122,0.6);
    }

    /* ── SVG vine lines ──────────────────────────────────── */
    .spoke {
      stroke: rgba(90,170,100,0.68);
      stroke-width: 1.6; fill: none;
      stroke-dasharray: 9 4 2 4;
      transition: stroke 0.35s, stroke-width 0.35s;
    }
    .seg {
      stroke: rgba(80,185,110,0.35);
      stroke-width: 1; fill: none;
      transition: stroke 0.28s, stroke-width 0.28s;
    }
    .spoke.lit { stroke: rgba(163,255,198,0.95); stroke-width: 2; }
    .seg.lit   { stroke: rgba(163,255,198,0.65); stroke-width: 1.5; }
  </style>
</head>
<body>

<canvas id="cvs"></canvas>
<svg id="net" width="100%" height="100%"></svg>

<div id="hub">
  <div class="aura aura-1"></div>
  <div class="logo-wrap">
<img src="/logo" alt="Aviary" onerror="this.style.display='none'">
  </div>
</div>

<div id="hub-text">
  <div class="hub-title">Aviary</div>
  <div class="hub-sub">Metagenomics Pipeline</div>
</div>

<script>
/* ============================================================
   NODES
============================================================ */
const NODES = [
  { label: 'Monitor',       href: '/dashboard', icon: 'monitor'  },
  { label: 'Assembly',      href: '/assembly',  icon: 'assembly' },
  { label: 'Results',       href: '/graph',     icon: 'results'  },
  { label: 'Phylogenetics', href: '/phylo',     icon: 'phylo'    },
  { label: 'Export',        href: '/export',    icon: 'export'   },
  { label: 'Guide',         href: '/guide',     icon: 'guide'    },
  { label: 'Docs',          href: '/docs',      icon: 'docs'     },
];

const ICONS = {
  monitor: `
    <rect x="2" y="3" width="20" height="14" rx="2"/>
    <line x1="8" y1="21" x2="16" y2="21"/>
    <line x1="12" y1="17" x2="12" y2="21"/>
    <polyline points="6,9 10,13 14,9 18,12"/>`,
  assembly: `
    <circle cx="12" cy="12" r="2.2"/>
    <circle cx="4"  cy="6"  r="1.8"/>
    <circle cx="20" cy="6"  r="1.8"/>
    <circle cx="4"  cy="18" r="1.8"/>
    <circle cx="20" cy="18" r="1.8"/>
    <line x1="5.8"  y1="7"   x2="10.3" y2="10.6"/>
    <line x1="18.2" y1="7"   x2="13.7" y2="10.6"/>
    <line x1="5.8"  y1="17"  x2="10.3" y2="13.4"/>
    <line x1="18.2" y1="17"  x2="13.7" y2="13.4"/>`,
  results: `
    <line x1="18" y1="20" x2="18" y2="10"/>
    <line x1="12" y1="20" x2="12" y2="4"/>
    <line x1="6"  y1="20" x2="6"  y2="14"/>
    <line x1="2"  y1="20" x2="22" y2="20"/>`,
  phylo: `
    <line x1="12" y1="3"  x2="12" y2="8"/>
    <line x1="12" y1="8"  x2="7"  y2="13"/>
    <line x1="12" y1="8"  x2="17" y2="13"/>
    <line x1="7"  y1="13" x2="5"  y2="18"/>
    <line x1="7"  y1="13" x2="9"  y2="18"/>
    <line x1="17" y1="13" x2="15" y2="18"/>
    <line x1="17" y1="13" x2="19" y2="18"/>
    <circle cx="12" cy="3"  r="1.5" fill="currentColor" stroke="none"/>
    <circle cx="5"  cy="18" r="1.5" fill="currentColor" stroke="none"/>
    <circle cx="9"  cy="18" r="1.5" fill="currentColor" stroke="none"/>
    <circle cx="15" cy="18" r="1.5" fill="currentColor" stroke="none"/>
    <circle cx="19" cy="18" r="1.5" fill="currentColor" stroke="none"/>`,
  export: `
    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
    <polyline points="7,10 12,15 17,10"/>
    <line x1="12" y1="15" x2="12" y2="3"/>`,
  guide: `
    <circle cx="12" cy="12" r="10"/>
    <polygon points="16.24,7.76 14.12,14.12 7.76,16.24 9.88,9.88"/>`,
  docs: `
    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
    <polyline points="14,2 14,8 20,8"/>
    <line x1="8"  y1="13" x2="16" y2="13"/>
    <line x1="8"  y1="17" x2="16" y2="17"/>
    <line x1="8"  y1="9"  x2="10" y2="9"/>`,
};

/* ============================================================
   CANVAS — forest atmosphere, fireflies
============================================================ */
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
let W, H, pts = [], stars = [], fireflies = [], canopyBands = [];
let tf = 0, _lastFloatT = 0;
let windX=0, windTarget=0, windTimer=0;

function resizeCvs() { W = cvs.width = innerWidth; H = cvs.height = innerHeight; }

function buildCanopy() {
  canopyBands.length = 0;
  const layers = [
    { y: 0.18, alpha: 0.22, sway: 6,  scale: 0.82, density: 12 },
    { y: 0.12, alpha: 0.44, sway: 9,  scale: 1.0,  density: 14 },
    { y: 0.08, alpha: 0.78, sway: 12, scale: 1.18, density: 16 }
  ];
  layers.forEach((layer, idx) => {
    const items = [];
    const count = layer.density;
    for (let i = 0; i < count; i++) {
      const frac = i / (count - 1);
      items.push({
        x:      frac * W + (Math.random() - 0.5) * (W / count) * 0.45,
        width:  (40 + Math.random() * 90)  * layer.scale,
        height: (80 + Math.random() * 170) * layer.scale,
        phase:  Math.random() * Math.PI * 2,
        type:   idx === 2 ? (Math.random() > 0.45 ? 'round' : 'pine') : (Math.random() > 0.60 ? 'pine' : 'round')
      });
    }
    canopyBands.push({ ...layer, items });
  });
}

function drawRoundTree(x, baseY, width, height, sway, alpha) {
  const trunkW = Math.max(8, width * 0.12);
  const crownY = baseY - height * 0.78;
  ctx.save();
  ctx.translate(sway, 0);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#031008';
  ctx.beginPath();
  ctx.moveTo(x - trunkW / 2, 0);
  ctx.lineTo(x - trunkW / 2, baseY);
  ctx.lineTo(x - width * 0.52, baseY);
  ctx.bezierCurveTo(x - width * 0.68, baseY - height * 0.18, x - width * 0.56, crownY + height * 0.20, x - width * 0.24, crownY + height * 0.08);
  ctx.bezierCurveTo(x - width * 0.16, crownY - height * 0.08, x - width * 0.04, crownY - height * 0.02, x, crownY);
  ctx.bezierCurveTo(x + width * 0.04, crownY - height * 0.02, x + width * 0.16, crownY - height * 0.08, x + width * 0.24, crownY + height * 0.08);
  ctx.bezierCurveTo(x + width * 0.56, crownY + height * 0.20, x + width * 0.68, baseY - height * 0.18, x + width * 0.52, baseY);
  ctx.lineTo(x + trunkW / 2, baseY);
  ctx.lineTo(x + trunkW / 2, 0);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawPineTree(x, baseY, width, height, sway, alpha) {
  const trunkW = Math.max(7, width * 0.10);
  const topY   = baseY - height;
  ctx.save();
  ctx.translate(sway, 0);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#020d06';
  ctx.beginPath();
  ctx.moveTo(x - trunkW / 2, 0);
  ctx.lineTo(x - trunkW / 2, baseY);
  ctx.lineTo(x - width * 0.50, baseY);
  ctx.lineTo(x - width * 0.28, baseY - height * 0.28);
  ctx.lineTo(x - width * 0.38, baseY - height * 0.28);
  ctx.lineTo(x - width * 0.14, baseY - height * 0.56);
  ctx.lineTo(x - width * 0.22, baseY - height * 0.56);
  ctx.lineTo(x, topY);
  ctx.lineTo(x + width * 0.22, baseY - height * 0.56);
  ctx.lineTo(x + width * 0.14, baseY - height * 0.56);
  ctx.lineTo(x + width * 0.38, baseY - height * 0.28);
  ctx.lineTo(x + width * 0.28, baseY - height * 0.28);
  ctx.lineTo(x + width * 0.50, baseY);
  ctx.lineTo(x + trunkW / 2, baseY);
  ctx.lineTo(x + trunkW / 2, 0);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawCanopy() {
  canopyBands.forEach((layer, layerIndex) => {
    const baseY = H * layer.y;
    layer.items.forEach((tree, i) => {
      const sway = Math.sin(tf * 0.22 + tree.phase + layerIndex * 0.4) * layer.sway;
      const x    = tree.x + Math.sin(tf * 0.08 + i * 0.42) * 4;
      if (tree.type === 'pine') {
        drawPineTree(x, baseY, tree.width, tree.height, sway, layer.alpha);
      } else {
        drawRoundTree(x, baseY, tree.width, tree.height, sway, layer.alpha);
      }
    });
  });
  const moonCut = ctx.createRadialGradient(W/2, H*0.45, 0, W/2, H*0.45, Math.min(W,H)*0.34);
  moonCut.addColorStop(0,   'rgba(203,255,216,0.08)');
  moonCut.addColorStop(0.5, 'rgba(203,255,216,0.03)');
  moonCut.addColorStop(1,   'rgba(203,255,216,0)');
  ctx.fillStyle = moonCut;
  ctx.fillRect(0, 0, W, H);
}

function mkPt() {
  return {
    x: Math.random()*W, y: Math.random()*H,
    vx: (Math.random()-0.5)*0.14, vy: (Math.random()-0.5)*0.14,
    r: Math.random()*1.2+0.3, a: Math.random()*0.18+0.04,
  };
}
function mkStar() {
  return {
    x: Math.random()*W, y: Math.random()*H,
    r: Math.random()*1.4+0.4,
    base: Math.random()*0.30+0.08, phase: Math.random()*Math.PI*2,
  };
}
function mkFirefly() {
  return {
    x: Math.random()*W, y: Math.random()*H,
    vx: (Math.random()-0.5)*0.84, vy: (Math.random()-0.5)*0.84,
    phase: Math.random()*Math.PI*2, speed: Math.random()*0.8+0.4,
    trail: [],
  };
}
function initPts() {
  pts       = Array.from({length: 40}, mkPt);
  stars     = Array.from({length: 40}, mkStar);
  fireflies = Array.from({length: 18}, mkFirefly);
}

function drawCvs() {
  ctx.clearRect(0, 0, W, H);
  // Background
  const g = ctx.createRadialGradient(W/2,H/2,0, W/2,H/2, Math.max(W,H)*0.7);
  g.addColorStop(0,   '#0e2e14');
  g.addColorStop(0.4, '#09200f');
  g.addColorStop(1,   '#061a0d');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  // Moon glow — soft luminous halo behind logo
  const mg = ctx.createRadialGradient(W/2,H/2,0, W/2,H/2,Math.min(W,H)*0.38);
  mg.addColorStop(0,   `rgba(210,255,195,${0.055+0.018*Math.sin(tf*0.4)})`);
  mg.addColorStop(0.5, 'rgba(140,210,150,0.025)');
  mg.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle=mg; ctx.fillRect(0,0,W,H);

  // Stars
  stars.forEach(s => {
    const a = s.base + 0.22*Math.sin(tf*1.4+s.phase);
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,240,225,${Math.max(0,a)})`; ctx.fill();
  });

  // Particle connections
  for (let i=0;i<pts.length;i++) for (let j=i+1;j<pts.length;j++) {
    const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<100){
      ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y);
      ctx.strokeStyle=`rgba(80,180,110,${0.10*(1-d/100)})`;
      ctx.lineWidth=0.5; ctx.stroke();
    }
  }
  pts.forEach(p=>{
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(80,170,110,${p.a})`; ctx.fill();
  });

  // Fireflies with trails
  fireflies.forEach(f=>{
    // Trail — oldest point (index 0) is faintest, newest (last) is brightest
    if(f.trail.length>1){
      for(let k=1;k<f.trail.length;k++){
        const ta = Math.pow(k/f.trail.length, 1.8) * 0.65;
        const lw = 0.6 + (k/f.trail.length)*1.6;
        ctx.beginPath(); ctx.moveTo(f.trail[k-1].x,f.trail[k-1].y);
        ctx.lineTo(f.trail[k].x,f.trail[k].y);
        ctx.strokeStyle=`rgba(180,255,120,${ta})`;
        ctx.lineWidth=lw; ctx.stroke();
      }
    }
    const a = 0.25+0.65*Math.abs(Math.sin(tf*f.speed+f.phase));
    const r = 1.4+0.9*Math.abs(Math.sin(tf*f.speed*0.7+f.phase));
    const grd=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,r*5);
    grd.addColorStop(0,`rgba(170,255,120,${a*0.5})`);
    grd.addColorStop(1,'rgba(170,255,120,0)');
    ctx.beginPath(); ctx.arc(f.x,f.y,r*5,0,Math.PI*2); ctx.fillStyle=grd; ctx.fill();
    ctx.beginPath(); ctx.arc(f.x,f.y,r,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,255,140,${a})`; ctx.fill();
  });

  drawCanopy();
}

function tickPts() {
  // Wind — gentle gusts every 9-15 seconds
  windTimer+=0.016;
  if(windTimer>9+Math.random()*6){ windTimer=0; windTarget=(Math.random()-0.5)*0.7; }
  windX+=(windTarget-windX)*0.008;

  pts.forEach(p=>{
    p.x+=p.vx+windX*0.3; p.y+=p.vy;
    if(p.x<0)p.x=W; if(p.x>W)p.x=0;
    if(p.y<0)p.y=H; if(p.y>H)p.y=0;
  });
  stars.forEach(s=>{
    s.x+=(Math.random()-0.5)*0.03; s.y+=(Math.random()-0.5)*0.03;
    if(s.x<0)s.x=W; if(s.x>W)s.x=0;
    if(s.y<0)s.y=H; if(s.y>H)s.y=0;
  });
  fireflies.forEach(f=>{
    f.trail.push({x:f.x,y:f.y});
    if(f.trail.length>28) f.trail.shift();
    f.x+=f.vx+Math.sin(tf*0.5+f.phase)*0.9+windX*0.5;
    f.y+=f.vy+Math.cos(tf*0.4+f.phase)*0.9;
    if(f.x<0){f.x=W; f.trail=[];} if(f.x>W){f.x=0; f.trail=[];}
    if(f.y<0){f.y=H; f.trail=[];} if(f.y>H){f.y=0; f.trail=[];}
  });
}

/* ============================================================
   LAYOUT
============================================================ */
let CX, CY, R;
function calcLayout() {
  CX = innerWidth/2; CY = innerHeight/2;
  R  = Math.min(innerWidth, innerHeight)*0.355;
}
function basePos(i) {
  const a = (i/NODES.length)*Math.PI*2 - Math.PI/2;
  return { x: CX+R*Math.cos(a), y: CY+R*Math.sin(a) };
}

/* ============================================================
   NODES
============================================================ */
const nodeEls = [];
const floatPh = NODES.map((_,i) => (i/NODES.length)*Math.PI*2);

function buildNodes() {
  NODES.forEach((n,i) => {
    const el = document.createElement('a');
    el.className = 'node';
    el.href = n.href;
    el.style.animationDelay = `${0.15+i*0.09}s`;
    el.innerHTML = `
      <div class="disc">
        <svg viewBox="0 0 24 24" style="color:var(--teal)">${ICONS[n.icon]}</svg>
      </div>
      <span class="node-lbl">${n.label}</span>`;
    document.body.appendChild(el);
    nodeEls.push(el);
    el.addEventListener('mouseenter', () => setHover(i, true));
    el.addEventListener('mouseleave', () => setHover(i, false));
    el.addEventListener('click', e => {
      e.preventDefault();
      const p=basePos(i);
      const rp=rippleEls[rippleIdx%rippleEls.length];
      rp.radius=18; rp.alpha=0.70; rp.active=true;
      rp.ox=p.x; rp.oy=p.y;
      rp.el.setAttribute('cx',p.x); rp.el.setAttribute('cy',p.y);
      rippleIdx++; lastRipple=performance.now()-3000;
      setTimeout(()=>{ window.location=n.href; },380);
    });
  });
}
function posNodes() {
  nodeEls.forEach((el,i) => {
    const p=basePos(i);
    el.style.left=p.x+'px'; el.style.top=p.y+'px';
  });
}

/* ============================================================
   SVG NETWORK
============================================================ */
const svg = document.getElementById('net');
const NS  = 'http://www.w3.org/2000/svg';
let spokes=[], segs=[], rippleEls=[], branchGroups=[], rootTrees=[];
let lastRipple=0;
const hoverProgress = NODES.map(()=>0);
const hoverAnimIds  = NODES.map(()=>null);

function buildSvg() {
  svg.innerHTML='';
  spokes=[]; segs=[]; rippleEls=[];

  const defs = document.createElementNS(NS,'defs');
  defs.innerHTML=`
    <filter id="glow4" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>`;
  svg.appendChild(defs);

  // Woven nest ring around logo (3 dashed twig-circles)
  const nestR=185;
  [
    {r:nestR-6, dash:'16 7', off:0,    sw:2.0, col:'rgba(140,95,45,0.48)'},
    {r:nestR,   dash:'14 9', off:11.5, sw:1.8, col:'rgba(115,78,35,0.38)'},
    {r:nestR+6, dash:'12 11',off:5,    sw:1.6, col:'rgba(160,110,55,0.32)'},
  ].forEach(({r,dash,off,sw,col})=>{
    const nc=document.createElementNS(NS,'circle');
    nc.setAttribute('cx',CX); nc.setAttribute('cy',CY); nc.setAttribute('r',r);
    nc.setAttribute('fill','none'); nc.setAttribute('stroke',col);
    nc.setAttribute('stroke-width',sw); nc.setAttribute('stroke-dasharray',dash);
    nc.setAttribute('stroke-dashoffset',off); svg.appendChild(nc);
  });

  // Decorative vine rings
  [R*0.50, R, R+36].forEach((r,idx) => {
    const c = document.createElementNS(NS,'circle');
    c.setAttribute('cx',CX); c.setAttribute('cy',CY); c.setAttribute('r',r);
    c.setAttribute('fill','none');
    c.setAttribute('stroke',`rgba(80,185,110,${idx===1?0.45:0.20})`);
    c.setAttribute('stroke-width','1');
    if(idx===2) c.setAttribute('stroke-dasharray','3 9');
    svg.appendChild(c);
  });


  // Ring segments
  NODES.forEach((_,i) => {
    const j=(i+1)%NODES.length;
    const p1=basePos(i), p2=basePos(j);
    const el=document.createElementNS(NS,'line');
    el.setAttribute('x1',p1.x); el.setAttribute('y1',p1.y);
    el.setAttribute('x2',p2.x); el.setAttribute('y2',p2.y);
    el.setAttribute('class','seg');
    svg.appendChild(el);
    segs.push({el,i,j});
  });

  // Spokes — curved bezier for organic vine feel
  NODES.forEach((_,i) => {
    const p = basePos(i);
    const wobble = Math.sin(i*1.8+0.5)*22;
    const perpX  = -(p.y-CY)/R*wobble;
    const perpY  =  (p.x-CX)/R*wobble;
    const cpx=(CX+p.x)/2+perpX, cpy=(CY+p.y)/2+perpY;
    const el=document.createElementNS(NS,'path');
    el.setAttribute('d',`M ${CX} ${CY} Q ${cpx} ${cpy} ${p.x} ${p.y}`);
    el.setAttribute('class','spoke');
    svg.appendChild(el);
    spokes.push(el);
  });

  // Branch offshoots — small twig ticks along each spoke
  NODES.forEach((_,i) => {
    const p=basePos(i);
    const wobble=Math.sin(i*1.8+0.5)*22;
    const perpX=-(p.y-CY)/R*wobble, perpY=(p.x-CX)/R*wobble;
    const cpx=(CX+p.x)/2+perpX, cpy=(CY+p.y)/2+perpY;
    [0.25,0.45,0.65,0.80].forEach((frac,ki)=>{
      const f=1-frac;
      // Point on quadratic bezier
      const bx=f*f*CX+2*f*frac*cpx+frac*frac*p.x;
      const by=f*f*CY+2*f*frac*cpy+frac*frac*p.y;
      // Tangent
      const tbx=2*f*(cpx-CX)+2*frac*(p.x-cpx);
      const tby=2*f*(cpy-CY)+2*frac*(p.y-cpy);
      const tl=Math.hypot(tbx,tby)||1;
      const nx=-tby/tl, ny=tbx/tl;
      const tLen=4+ki*1.5;
      const sign=ki%2===0?1:-1;
      const tk=document.createElementNS(NS,'line');
      tk.setAttribute('x1',bx); tk.setAttribute('y1',by);
      tk.setAttribute('x2',bx+nx*tLen*sign); tk.setAttribute('y2',by+ny*tLen*sign);
      tk.setAttribute('stroke','rgba(90,175,110,0.38)');
      tk.setAttribute('stroke-width','0.9'); svg.appendChild(tk);
    });
  });

  // Node glow dots
  NODES.forEach((_,i) => {
    const p=basePos(i);
    const d=document.createElementNS(NS,'circle');
    d.setAttribute('cx',p.x); d.setAttribute('cy',p.y); d.setAttribute('r',2.5);
    d.setAttribute('fill','rgba(120,220,150,0.80)');
    d.setAttribute('filter','url(#glow4)');
    svg.appendChild(d);
  });

  // Spoke leaf system — leaves bloom along each spoke on hover, from hub outward
  branchGroups=[];
  const LEAF_FRACS=[0.11,0.21,0.32,0.43,0.54,0.64,0.74,0.84,0.92];
  const LEAF_COLS=[
    'rgba(70,190,80,0.90)','rgba(80,175,65,0.86)','rgba(60,165,55,0.88)',
    'rgba(90,200,70,0.84)','rgba(65,180,60,0.90)','rgba(75,170,58,0.86)',
    'rgba(85,195,72,0.88)','rgba(68,160,62,0.84)','rgba(78,185,68,0.90)',
  ];
  NODES.forEach((_,i) => {
    const p = basePos(i);
    const wobble = Math.sin(i*1.8+0.5)*22;
    const perpX  = -(p.y-CY)/R*wobble;
    const perpY  =  (p.x-CX)/R*wobble;
    const cpx=(CX+p.x)/2+perpX, cpy=(CY+p.y)/2+perpY;
    const group=[];

    LEAF_FRACS.forEach((frac,fi)=>{
      const ft=1-frac;
      // Point on the quadratic bezier spoke
      const bx=ft*ft*CX + 2*ft*frac*cpx + frac*frac*p.x;
      const by=ft*ft*CY + 2*ft*frac*cpy + frac*frac*p.y;
      // Tangent at this point
      const tbx=2*ft*(cpx-CX)+2*frac*(p.x-cpx);
      const tby=2*ft*(cpy-CY)+2*frac*(p.y-cpy);
      const tl=Math.hypot(tbx,tby)||1;
      const nx=-tby/tl, ny=tbx/tl;  // perpendicular to spoke
      const ang=Math.atan2(tby,tbx);

      // Leaves grow larger as they approach the node
      const scale=0.45+frac*0.85;
      const targetRx=(3.2+frac*5.5)*scale;
      const targetRy=(1.4+frac*2.2)*scale;
      const leafDist=(6+frac*7)*scale;
      const startT=frac*0.76;
      const winLen=0.26;

      [-1,1].forEach(side=>{
        const lx=bx+nx*leafDist*side;
        const ly=by+ny*leafDist*side;
        const leafAngDeg=ang*180/Math.PI+side*32;
        const leaf=document.createElementNS(NS,'ellipse');
        leaf.setAttribute('cx','0'); leaf.setAttribute('cy','0');
        leaf.setAttribute('rx','0'); leaf.setAttribute('ry','0');
        leaf.setAttribute('fill',LEAF_COLS[fi]);
        leaf.setAttribute('transform',`translate(${lx},${ly}) rotate(${leafAngDeg})`);
        svg.appendChild(leaf);
        group.push({
          line:null, dot:leaf, fullLen:0,
          targetRx, targetRy, startT, winLen,
          baseLx:lx, baseLy:ly,
          depth:fi/LEAF_FRACS.length,
          angleDeg:ang*180/Math.PI,
          sideOff:side,
          phase:Math.random()*Math.PI*2,
        });
      });
    });

    branchGroups.push(group);
  });

  // Outer decorative ring
  const outerCount=42, outerR=R+95;
  const outerRing=document.createElementNS(NS,'circle');
  outerRing.setAttribute('cx',CX); outerRing.setAttribute('cy',CY);
  outerRing.setAttribute('r',outerR);
  outerRing.setAttribute('fill','none');
  outerRing.setAttribute('stroke','rgba(80,185,110,0.28)');
  outerRing.setAttribute('stroke-width','1');
  svg.appendChild(outerRing);

  for(let k=0;k<outerCount;k++){
    const oa=(k/outerCount)*Math.PI*2-Math.PI/2;
    const ox=CX+outerR*Math.cos(oa), oy=CY+outerR*Math.sin(oa);
    const ni=Math.round(k*NODES.length/outerCount)%NODES.length;
    const na=(ni/NODES.length)*Math.PI*2-Math.PI/2;
    const lx=CX+(R+98)*Math.cos(na), ly=CY+(R+98)*Math.sin(na);
    const ln=document.createElementNS(NS,'line');
    ln.setAttribute('x1',lx); ln.setAttribute('y1',ly);
    ln.setAttribute('x2',ox); ln.setAttribute('y2',oy);
    ln.setAttribute('stroke','rgba(80,185,110,0.30)');
    ln.setAttribute('stroke-width','0.5');
    svg.appendChild(ln);
    const dotR=k%5===0?3.2:k%3===0?2.4:1.8;
    const dot=document.createElementNS(NS,'circle');
    dot.setAttribute('cx',ox); dot.setAttribute('cy',oy); dot.setAttribute('r',dotR);
    dot.setAttribute('fill',`rgba(120,220,150,${k%5===0?0.80:0.55})`);
    svg.appendChild(dot);
  }

  // Ripple pool
  for(let i=0;i<3;i++){
    const r=document.createElementNS(NS,'circle');
    r.setAttribute('cx',CX); r.setAttribute('cy',CY); r.setAttribute('r',0);
    r.setAttribute('fill','none');
    r.setAttribute('stroke','rgba(92,184,122,0)');
    r.setAttribute('stroke-width','1');
    svg.appendChild(r);
    rippleEls.push({el:r,radius:0,alpha:0,active:false});
  }

  // Root/tree branches (added last so they render on top of background rings)
  buildRootTrees();
}

function setHover(i, on) {
  spokes[i].classList.toggle('lit', on);
  segs.forEach(s=>{if(s.i===i||s.j===i)s.el.classList.toggle('lit',on);});
  animateBranches(i, on);
}

/* ============================================================
   LEAF ANIMATION
============================================================ */
function easeOut(t){ return 1-Math.pow(1-t,3); }

function animateBranches(idx, expanding) {
  if(hoverAnimIds[idx]) cancelAnimationFrame(hoverAnimIds[idx]);
  const start=hoverProgress[idx], end=expanding?1:0;
  const duration=1000*Math.abs(end-start);
  if(duration===0) return;
  const t0=performance.now();
  function step(now){
    const raw  =Math.min((now-t0)/duration,1);
    const eased=expanding?easeOut(raw):1-easeOut(1-raw);
    hoverProgress[idx]=start+(end-start)*eased;
    const prog=hoverProgress[idx];
    branchGroups[idx].forEach(b=>{
      const local=Math.max(0,Math.min(1,(prog-b.startT)/b.winLen));
      if(b.line) b.line.setAttribute('stroke-dashoffset',b.fullLen*(1-local));
      b.dot.setAttribute('rx',local*b.targetRx);
      b.dot.setAttribute('ry',local*b.targetRy);
    });
    if(raw<1){
      hoverAnimIds[idx]=requestAnimationFrame(step);
    } else {
      hoverProgress[idx]=end; hoverAnimIds[idx]=null;
    }
  }
  hoverAnimIds[idx]=requestAnimationFrame(step);
}

/* ============================================================
   ROOT / TREE HOVER BRANCHES
============================================================ */
const LEAF_TREE_COLS = [
  'rgba(70,195,90,0.88)', 'rgba(85,175,70,0.82)', 'rgba(60,180,75,0.86)',
  'rgba(95,205,80,0.80)', 'rgba(75,165,65,0.84)',
];

function buildRootTrees() {
  rootTrees = [];
  NODES.forEach((_, i) => {
    const p = basePos(i);
    const baseAngle = (i / NODES.length) * Math.PI * 2 - Math.PI / 2;
    const branches = [];

    function addBranch(parentIdx, relAngle, len, depth, startT) {
      const idx = branches.length;
      const sw  = depth === 3 ? 1.6 : depth === 2 ? 1.0 : 0.6;
      const col = depth === 3 ? 'rgba(110,205,135,0.72)'
                : depth === 2 ? 'rgba(90,180,115,0.55)'
                :               'rgba(76,162,100,0.40)';
      const el = document.createElementNS(NS, 'line');
      el.setAttribute('stroke', col);
      el.setAttribute('stroke-width', sw);
      el.setAttribute('stroke-linecap', 'round');
      el.setAttribute('opacity', '0');
      svg.appendChild(el);

      // Leaf ellipses at branch tip — 2 per branch, on each side
      const leafEls = [];
      const leafRx = depth === 1 ? 4.5 : depth === 2 ? 3.2 : 2.0;
      const leafRy = leafRx * 0.42;
      [-1, 1].forEach((side, si) => {
        const lf = document.createElementNS(NS, 'ellipse');
        lf.setAttribute('cx', '0'); lf.setAttribute('cy', '0');
        lf.setAttribute('rx', '0'); lf.setAttribute('ry', '0');
        lf.setAttribute('fill', LEAF_TREE_COLS[(idx + si) % LEAF_TREE_COLS.length]);
        lf.setAttribute('opacity', '0');
        svg.appendChild(lf);
        leafEls.push({ el: lf, side, targetRx: leafRx, targetRy: leafRy, phase: Math.random()*Math.PI*2 });
      });

      branches.push({ el, parentIdx, relAngle, len, depth, startT, leafEls,
                      startX: 0, startY: 0, endX: 0, endY: 0, _absAngle: 0 });
      if (depth > 1) {
        const spread = 0.52;
        addBranch(idx, -spread, len * 0.60, depth - 1, startT + 0.28);
        addBranch(idx, +spread, len * 0.60, depth - 1, startT + 0.28);
      }
    }

    // 1 trunk + 2 main branches + 4 sub-branches = 7 per node
    addBranch(-1, 0, 50, 3, 0.0);
    rootTrees.push({ branches, baseAngle });
  });
}

function tickRootTrees() {
  const windSway = windX * 0.6;
  NODES.forEach((_, i) => {
    const prog = hoverProgress[i];
    const tree = rootTrees[i];
    const p    = basePos(i);

    tree.branches.forEach(b => {
      const localProg = Math.max(0, Math.min(1, (prog - b.startT) / 0.35));
      // Leaves bloom after each branch is mostly grown
      const leafProg  = Math.max(0, Math.min(1, (localProg - 0.65) / 0.35));

      let absAngle;
      if (b.parentIdx === -1) {
        absAngle = tree.baseAngle + windSway * 0.28;
        b.startX = p.x;
        b.startY = p.y;
      } else {
        const par = tree.branches[b.parentIdx];
        absAngle  = par._absAngle + b.relAngle + windSway * (4 - b.depth) * 0.32;
        b.startX  = par.endX;
        b.startY  = par.endY;
      }
      b._absAngle = absAngle;

      const curLen = b.len * localProg;
      b.endX = b.startX + Math.cos(absAngle) * curLen;
      b.endY = b.startY + Math.sin(absAngle) * curLen;

      if (localProg > 0) {
        b.el.setAttribute('x1', b.startX);
        b.el.setAttribute('y1', b.startY);
        b.el.setAttribute('x2', b.endX);
        b.el.setAttribute('y2', b.endY);
        b.el.setAttribute('opacity', '1');
      } else {
        b.el.setAttribute('opacity', '0');
      }

      // Leaves at branch tip — splay perpendicular, sway gently
      const nx = -Math.sin(absAngle);
      const ny =  Math.cos(absAngle);
      const leafAngDeg = absAngle * 180 / Math.PI;
      b.leafEls.forEach(lf => {
        if (leafProg > 0) {
          const sway = Math.sin(tf * 1.6 + lf.phase) * windSway * 6;
          const dist = lf.targetRy * 2.8 * lf.side;
          const lx = b.endX + nx * dist;
          const ly = b.endY + ny * dist;
          lf.el.setAttribute('cx', '0'); lf.el.setAttribute('cy', '0');
          lf.el.setAttribute('rx', lf.targetRx * leafProg);
          lf.el.setAttribute('ry', lf.targetRy * leafProg);
          lf.el.setAttribute('transform', `translate(${lx},${ly}) rotate(${leafAngDeg + lf.side*35 + sway})`);
          lf.el.setAttribute('opacity', '1');
        } else {
          lf.el.setAttribute('opacity', '0');
        }
      });
    });
  });
}

/* ============================================================
   FLOAT + LEAF SWAY
============================================================ */
function tickFloat(now) {
  const dt=Math.min((now-_lastFloatT)/1000,0.05);
  _lastFloatT=now;
  tf+=dt*0.55;
  nodeEls.forEach((el,i)=>{
    const p =basePos(i);
    el.style.left=p.x+'px';
    el.style.top =(p.y+11)+'px';

    if(hoverProgress[i]>0 && branchGroups[i]){
      branchGroups[i].forEach(b=>{
        // Leaves sway in place by rotation — deeper leaves sway more
        const rotSway=b.angleDeg+b.sideOff*32+Math.sin(tf*1.4+b.phase)*b.depth*12;
        b.dot.setAttribute('transform',`translate(${b.baseLx},${b.baseLy}) rotate(${rotSway})`);
      });
    }
  });
}

/* ============================================================
   RIPPLE
============================================================ */
let rippleIdx=0;
function tickRipples(now){
  if(now-lastRipple>2600){
    const rp=rippleEls[rippleIdx%rippleEls.length];
    rp.radius=30; rp.alpha=0.38; rp.active=true;
    rippleIdx++; lastRipple=now;
  }
  rippleEls.forEach(rp=>{
    if(!rp.active) return;
    rp.radius+=2.8; rp.alpha-=0.008;
    if(rp.alpha<=0){rp.active=false;rp.alpha=0;}
    rp.el.setAttribute('r',rp.radius);
    rp.el.setAttribute('stroke',`rgba(92,184,122,${Math.max(0,rp.alpha)})`);
  });
}

/* ============================================================
   LOOP + INIT
============================================================ */
function loop(now){
  tickPts(); drawCvs(); tickFloat(now); tickRipples(now); tickRootTrees();
  requestAnimationFrame(loop);
}

resizeCvs(); buildCanopy(); calcLayout(); initPts();
buildNodes(); posNodes(); buildSvg();
requestAnimationFrame(loop);

window.addEventListener('resize',()=>{
  resizeCvs(); buildCanopy(); calcLayout(); posNodes(); buildSvg();
});
</script>
</body>
</html>
