[workspace]
authors = ["Rhys Newell <rhys.newell94@gmail.com>"]
channels = ["conda-forge", "bioconda"]
name = "aviary"
platforms = ["linux-64"]

[feature.main.dependencies]
python = ">=3.8"
# snakemake = ">=7.0.0, <8" # v7 max due to (at least) import error
snakemake = "9.*" # Current target, v10 not released yet
"ruamel.yaml" = ">=0.15.99"
numpy = "*"
pandas = "*"
polars = "*"
biopython = "*"
pigz = ">=2.6"
parallel = "*"
extern = "*"
pyopenssl = ">22.1.0"
pixi = "*"
pip = "*"
setuptools = "*"
bird_tool_utils_python = "*"

[tasks]
postinstall-base = { cmd = "pip install --no-build-isolation --no-deps --disable-pip-version-check -e ..", cwd = "aviary" }
update_deps = { cmd = "python ../admin/build_dep_defs_from_pixi.py", depends-on = ["postinstall"] }

[tasks.postinstall]
# install into both standard and dev envs
depends-on = [
    { task = "postinstall-base", environment = "main" },
    { task = "postinstall-base", environment = "dev" }
]

[tasks.run-a-test-base]
args = ["test_name"]
cmd = "pytest test --run-expensive -k {{ test_name }}"
depends-on = [
    {task = "postinstall-base", environment = "dev" }
]

[tasks.run-a-test]
args = ["test_name"]
depends-on = [
    # run postinstall in the dev environment
    { task = "postinstall-base", environment = "dev" },
    # then run the tests in the same env
    {task = "run-a-test-base", environment = "dev", args = [ "{{ test_name }}" ] }
]

[tasks.run-quick-tests-base]
cmd = "pytest test"
depends-on = [
    {task="postinstall-base", environment = "dev"}
]

[tasks.run-quick-tests]
depends-on = [
    # then run the tests in the same env
    {task = "run-quick-tests-base", environment = "dev" }
]

[tasks.build]
cmd = "aviary build"
depends-on = [
    { task = "postinstall-base", environment = "dev" }
]

[tasks.run-tests-at-cmr-base]
cmd = "test/run_tests_at_cmr"
depends-on = [
    {task="build", environment = "dev"}
]

[tasks.run-tests-at-cmr]
depends-on = [
    { task = "run-tests-at-cmr-base", environment = "dev" }
]

[feature.dev.dependencies]
pytest = "*"
ipython = "*"
toml = "*"
bird_tool_utils_python = "*"
snakemake-executor-plugin-cluster-generic = "*" # for run-tests-at-cmr

[feature.dev.activation]
# Sets metapackage environment variables, which are assumed to be in the db/ of
# the base directory (perhaps symlnked).
scripts = ["admin/set_env_vars.sh"]

[environments]
default = ["main"]
dev = ["dev", "main"]
# Overall environments
metabuli = ['metabuli']
singlem = ['singlem']
singlem-appraise = ['singlem-appraise']
# QC
chopper = ["chopper"]
fastqc = ["fastqc"]
nanoplot = ["nanoplot"]
quast = ["quast"]
bbmap = ["bbmap"]
# Assembly
flye = ["flye"]
myloasm = ["myloasm"]
polishing = ["polishing"]
pilon = ["pilon"]
minimap2 = ["minimap2"]
spades = ["spades"]
pysam = ["pysam"]
mfqe = ["mfqe"]
final-assembly = ["final-assembly"]
# Binning
seqkit = ["seqkit"]
metabat2 = ["metabat2"]
checkm2 = ["checkm2"]
coverm = ["coverm"]
das-tool = ["das-tool"]
rosella = ["rosella"]
maxbin2 = ["maxbin2"]
concoct = ["concoct"]
vamb = ["vamb"]
taxvamb = ["vamb"]
taxvamb-gpu = ["vamb", "vamb-gpu"]
semibin = ["semibin"]
semibin-gpu = ["semibin","semibin-gpu"]
comebin = ["comebin"]
comebin-gpu = ["comebin", "comebin-gpu"]
# Annotation
eggnog = ["eggnog"]
gtdbtk = ["gtdbtk"]
# Clustering
pggb = ["pggb"]

[feature.metabuli.dependencies]
metabuli = "~=1.1.0"

[feature.singlem.dependencies]
singlem = ">=0.20.3"
diamond = ">=2.1.21"

[feature.singlem.pypi-dependencies]
bird-tool-utils = "*"

[feature.singlem-appraise.dependencies]
# We use singlem v0.19 here because 0.20 introduced a major performance
# regression for --genome-fasta-files input.
singlem = "==0.19.0"

[feature.chopper.dependencies]
chopper = ">=0.6"
pigz = '*'

[feature.fastqc.dependencies]
fastqc = "==0.11.9"

[feature.nanoplot.dependencies]
