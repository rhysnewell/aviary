[workspace]
authors = ["Rhys Newell <rhys.newell94@gmail.com>"]
channels = ["conda-forge", "bioconda"]
name = "aviary"
platforms = [
  "linux-64",
  { name = "linux-64-cuda121", platform = "linux-64", cuda = "12.1" },
  { name = "linux-64-cuda118", platform = "linux-64", cuda = "11.8" },
]

[feature.cpu]
platforms = ["linux-64"]

[feature.main.dependencies]
python = ">=3.8"
# snakemake = ">=7.0.0, <8" # v7 max due to (at least) import error
snakemake = "9.*" # Current target, v10 not released yet
"ruamel.yaml" = ">=0.15.99"
numpy = "*"
pandas = "*"
polars = "*"
biopython = "*"
pigz = ">=2.6"
parallel = "*"
extern = "*"
pyopenssl = ">22.1.0"
pixi = ">=0.71" # Must understand rich platforms (cuda on platforms entries)
pip = "*"
setuptools = "*"
bird_tool_utils_python = "*"

[feature.web.dependencies]
python = ">=3.8"
flask = ">=2.3"

[feature.web.activation]
env = { PYTHONNOUSERSITE = "1" }

[tasks]
postinstall-base = { cmd = "pip install --no-build-isolation --no-deps --disable-pip-version-check -e ..", cwd = "aviary" }
server = { cmd = "python server.py", description = "Start the web interface (port 8090)", cwd = "aviary/web" }
update_deps = { cmd = "python ../admin/build_dep_defs_from_pixi.py", depends-on = ["postinstall"] }

[tasks.postinstall]
# install into both standard and dev envs
depends-on = [
    { task = "postinstall-base", environment = "main" },
    { task = "postinstall-base", environment = "dev" }
]

[tasks.run-a-test-base]
args = ["test_name"]
cmd = "pytest test --run-expensive -k {{ test_name }}"
depends-on = [
    {task = "postinstall-base", environment = "dev" }
]

[tasks.run-a-test]
args = ["test_name"]
depends-on = [
    # run postinstall in the dev environment
    { task = "postinstall-base", environment = "dev" },
    # then run the tests in the same env
    {task = "run-a-test-base", environment = "dev", args = [ "{{ test_name }}" ] }
]

[tasks.run-quick-tests-base]
cmd = "pytest test"
depends-on = [
    {task="postinstall-base", environment = "dev"}
]

[tasks.run-quick-tests]
depends-on = [
    # then run the tests in the same env
    {task = "run-quick-tests-base", environment = "dev" }
]

[tasks.build]
cmd = "aviary build"
depends-on = [
    { task = "postinstall-base", environment = "dev" }
]

[tasks.run-tests-at-cmr-base]
cmd = "test/run_tests_at_cmr"
depends-on = [
    {task="build", environment = "dev"}
]

[tasks.run-tests-at-cmr]
depends-on = [
    { task = "run-tests-at-cmr-base", environment = "dev" }
]

[tasks.run-test-aviary-download-base]
# Downloads the databases (into the repo db/ dir by default; override with
# AVIARY_TEST_DB_DIR) and runs the full aviary walkthrough on them.
# Run this from an INTERACTIVE session: --profile aqua makes aviary submit each
# download/pipeline rule to the PBS queue while pytest coordinates. Do NOT wrap
# this in mqsub (that would nest submission). Heavy + resumable: re-run to
# resume after an OOM/walltime kill. Build is required so the per-db pixi envs
# (checkm2, gtdbtk, ...) exist for the downloads + `aviary complete`.
cmd = "pytest test/test_aviary_download.py --run-download --profile aqua -v"
depends-on = [
    {task="build", environment = "dev"}
]

[tasks.run-test-aviary-download]
depends-on = [
    { task = "run-test-aviary-download-base", environment = "dev" }
]

[feature.dev.dependencies]
pytest = "*"
ipython = "*"
bird_tool_utils_python = "*"
setuptools-scm = "*" # needed by the release flow's --force-write-version-files step
snakemake-executor-plugin-cluster-generic = "*" # for run-tests-at-cmr

[feature.dev.activation]
# Sets metapackage environment variables, which are assumed to be in the db/ of
# the base directory (perhaps symlnked).
scripts = ["admin/set_env_vars.sh"]

[environments]
default = ["main", "cpu"]
dev = ["dev", "main", "cpu"]
web = ["web", "cpu"]
# Overall environments
metabuli = ['metabuli', "cpu"]
singlem = ['singlem', "cpu"]
singlem-appraise = ['singlem-appraise', "cpu"]
# QC
chopper = ["chopper", "cpu"]
rastqc = ["rastqc", "cpu"]
rastqc-long = ["rastqc-long", "cpu"]
nanoplot = ["nanoplot", "cpu"]
quast = ["quast", "cpu"]
bbmap = ["bbmap", "cpu"]
# Assembly
flye = ["flye", "cpu"]
myloasm = ["myloasm", "cpu"]
polishing = ["polishing", "cpu"]
pilon = ["pilon", "cpu"]
dnaapler = ["dnaapler", "cpu"]
minimap2 = ["minimap2", "cpu"]
spades = ["spades", "cpu"]
pysam = ["pysam", "cpu"]
mfqe = ["mfqe", "cpu"]
final-assembly = ["final-assembly", "cpu"]
# Binning
seqkit = ["seqkit", "cpu"]
metabat2 = ["metabat2", "cpu"]
checkm2 = ["checkm2", "cpu"]
coverm = ["coverm", "cpu"]
das-tool = ["das-tool", "cpu"]
rosella = ["rosella", "cpu"]
maxbin2 = ["maxbin2", "cpu"]
concoct = ["concoct", "cpu"]
vamb = ["vamb", "cpu"]
taxvamb = ["vamb", "cpu"]
taxvamb-gpu = ["vamb", "vamb-gpu"]
semibin = ["semibin", "cpu"]
semibin-gpu = ["semibin","semibin-gpu"]
comebin = ["comebin", "cpu"]
comebin-gpu = ["comebin", "comebin-gpu"]
# Annotation
eggnog = ["eggnog", "cpu"]
gtdbtk = ["gtdbtk", "cpu"]
# Clustering
pggb = ["pggb", "cpu"]

