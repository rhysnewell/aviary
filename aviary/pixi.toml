perl = ">=5.22.0"
perl-lwp-simple = "*"

[feature.concoct.dependencies]
scikit-learn = ">=1.1.0"
concoct = ">=1.1.0"

[feature.vamb.dependencies]
samtools = "*"
vamb = ">=5.0.0"

[feature.vamb-gpu]
system-requirements = { cuda = "12.1" }
channels = ["pytorch", "nvidia"]

[feature.vamb-gpu.dependencies]
pytorch-gpu = "*"

[feature.semibin.dependencies]
semibin = ">=2.1.0"

[feature.semibin-gpu]
system-requirements = { cuda = "12.1" }

[feature.semibin-gpu.dependencies]
pytorch-gpu = "*"

[feature.comebin.dependencies]
comebin = ">=1.0.0"

[feature.comebin-gpu]
system-requirements = { cuda = "11.8" }
channels = ["nvidia", "pytorch"]
channel-priority = "disabled"

[feature.comebin-gpu.dependencies]
# Pin mkl to <2024.1 to fix iJIT_NotifyEvent symbol error
# pytorch 1.10.2 is incompatible with mkl >= 2024.1
pytorch = { version = "==1.10.2", channel = "pytorch" }
pytorch-cuda = { version = "==11.8", channel = "pytorch" }
mkl = "==2024.0.0"

[feature.eggnog.dependencies]
eggnog-mapper =  ">=2.1.8"
parallel = "*"

[feature.gtdbtk.dependencies]
# When updating GTDB-Tk, please also update admin/set_env_vars.sh accordingly.
# and configure?
gtdbtk = ">=2.6.1" # Required given R226 data is used, and 
# numpy = "==2.2.6" # Required because of https://github.com/Ecogenomics/GTDBTk/issues/641
fastani = "*"

[feature.pggb.dependencies]
parallel = "*"
pggb = "*"
samtools = "*"
