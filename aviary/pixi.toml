nanoplot = ">=1.44"

[feature.quast.dependencies]
quast = "==5.0.2"

[feature.bbmap.dependencies]
bbmap = ">=39.52"

[feature.flye.dependencies]
flye = ">=2.9"
biopython = "*"

[feature.myloasm.dependencies]
