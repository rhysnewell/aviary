pysam = ">=0.16"

[feature.mfqe.dependencies]
seqkit = ">=2.1"
seqtk = ">=1.3"
mfqe = ">=0.5.0"
pigz = "*"

[feature.final-assembly.dependencies]
unicycler = ">=0.5.1"
samtools = ">=1.21"

[feature.seqkit.dependencies]
seqkit = "*"

[feature.metabat2.dependencies]
metabat2 = ">=2.15"

[feature.checkm2.dependencies]
checkm2 = ">=1.1.0"

[feature.coverm.dependencies]
coverm = ">=0.6"
galah = ">=0.3"
chopper = ">=0.6"
pigz = "*"
parallel = "*"
