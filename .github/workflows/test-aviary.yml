name: Test Aviary
on: [push, pull_request]

jobs:
  pixi_test_dependencies_locked:
    name: Pixi test_dependencies_locked ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["ubuntu-latest"]
    steps:
      - uses: actions/checkout@v4

      - name: Install Pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | bash
          echo "$HOME/.pixi/bin" >> $GITHUB_PATH

      - name: Create dev environment
        run: |
          pwd
          echo "Contents of current directory:"
          ls -la
          echo "Contents of aviary directory:"
          ls -la aviary
          # --manifest-path aviary/pixi.toml only needed first time to create symlinks
          pixi run -e dev --manifest-path aviary/pixi.toml postinstall
          pixi run -e dev pixi info

      - name: Show environment info
        run: |
          pixi run -e dev pixi list

      - name: Run tests with Pixi
        run: |
          pixi run -e dev aviary -h
          pixi run -e dev pytest -v

      - name: Ensure main env sanity
        run: |
          pixi run postinstall
          pixi run aviary -h

  # Run after removing lock file so dependences are unlocked
  pixi_test_dependencies_optimistic:
    name: Pixi test_dependencies_optimistic ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["ubuntu-latest"]
    steps:
      - uses: actions/checkout@v4

      - name: Install Pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | bash
          echo "$HOME/.pixi/bin" >> $GITHUB_PATH

      - name: Remove lock file
        run: |
          rm -fv pixi.lock admin/requirements.txt admin/environment.yml
          touch admin/requirements.txt

      - name: Create dev environment
        run: |
          pwd
          echo "Contents of current directory:"
          ls -la
          echo "Contents of aviary directory:"
          ls -la aviary
          # --manifest-path aviary/pixi.toml only needed first time to create symlinks
          pixi run -e dev --manifest-path aviary/pixi.toml postinstall
          pixi run -e dev pixi info

      - name: Show environment info
        run: |
          pixi run -e dev pixi list

      - name: Run tests with Pixi
        run: |
          pixi run -e dev aviary -h
          pixi run -e dev pytest -v

      - name: Ensure main env sanity
        run: |
          pixi run postinstall
          pixi run aviary -h
